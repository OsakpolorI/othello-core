name: Build and Deploy to Railway

on:
  push:
    branches: [ "main", "deploy/cloud" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Recreate School Files
        env:
          OTHELLO_JAVA: ${{ secrets.OTHELLO_JAVA_BASE64 }}
          OTHELLO_BOARD: ${{ secrets.OTHELLO_BOARD_BASE64 }}
          GREEDY_STRATEGY: ${{ secrets.GREEDY_STRATEGY_BASE64 }}
          HUMAN_STRATEGY: ${{ secrets.HUMAN_STRATEGY_BASE64 }}
          RANDOM_STRATEGY: ${{ secrets.RANDOM_STRATEGY_BASE64 }}
        run: |
          mkdir -p backend/src/main/java/com/othello/backend/engine/
          mkdir -p backend/src/main/java/com/othello/backend/strategy/

          # Function to safely decode
          decode_secret() {
            echo "$1" > temp_base64.txt
            openssl base64 -d -A -in temp_base64.txt -out "$2"
            rm temp_base64.txt
          }

          decode_secret "$OTHELLO_JAVA" "backend/src/main/java/com/othello/backend/engine/Othello.java"
          decode_secret "$OTHELLO_BOARD" "backend/src/main/java/com/othello/backend/engine/OthelloBoard.java"
          decode_secret "$GREEDY_STRATEGY" "backend/src/main/java/com/othello/backend/strategy/GreedyStrategy.java"
          decode_secret "$HUMAN_STRATEGY" "backend/src/main/java/com/othello/backend/strategy/HumanStrategy.java"
          decode_secret "$RANDOM_STRATEGY" "backend/src/main/java/com/othello/backend/strategy/RandomStrategy.java"
          
          echo "All school files recreated successfully."

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}