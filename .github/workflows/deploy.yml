name: Build and Deploy to Railway

on:
  push:
    branches: [ "main", "deploy/cloud" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Recreate School Files
        run: |
          mkdir -p backend/src/main/java/com/othello/backend/engine/
          mkdir -p backend/src/main/java/com/othello/backend/strategy/
          
          # We use 'cat' with a delimiter to write the secret directly to a file. 
          # This avoids shell character limits.
          
          cat <<EOF > othello.base64
          ${{ secrets.OTHELLO_JAVA_BASE64 }}
          EOF
          openssl base64 -d -A -in othello.base64 -out backend/src/main/java/com/othello/backend/engine/Othello.java
          
          cat <<EOF > board.base64
          ${{ secrets.OTHELLO_BOARD_BASE64 }}
          EOF
          openssl base64 -d -A -in board.base64 -out backend/src/main/java/com/othello/backend/engine/OthelloBoard.java
          
          cat <<EOF > greedy.base64
          ${{ secrets.GREEDY_STRATEGY_BASE64 }}
          EOF
          openssl base64 -d -A -in greedy.base64 -out backend/src/main/java/com/othello/backend/strategy/GreedyStrategy.java
          
          cat <<EOF > human.base64
          ${{ secrets.HUMAN_STRATEGY_BASE64 }}
          EOF
          openssl base64 -d -A -in human.base64 -out backend/src/main/java/com/othello/backend/strategy/HumanStrategy.java
          
          cat <<EOF > random.base64
          ${{ secrets.RANDOM_STRATEGY_BASE64 }}
          EOF
          openssl base64 -d -A -in random.base64 -out backend/src/main/java/com/othello/backend/strategy/RandomStrategy.java
          
          cat <<EOF > pgreedy.base64
          ${{ secrets.PLAYER_GREEDY_BASE64 }}
          EOF
          openssl base64 -d -A -in pgreedy.base64 -out backend/src/main/java/com/othello/backend/strategy/PlayerGreedy.java
          
          cat <<EOF > phuman.base64
          ${{ secrets.PLAYER_HUMAN_BASE64 }}
          EOF
          openssl base64 -d -A -in phuman.base64 -out backend/src/main/java/com/othello/backend/strategy/PlayerHuman.java
          
          echo "Decoding complete. Checking if files are whole..."
          tail -n 1 backend/src/main/java/com/othello/backend/engine/Othello.java

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway up --detach --project "$RAILWAY_PROJECT_ID" --environment production --service disciplined-abundance backend