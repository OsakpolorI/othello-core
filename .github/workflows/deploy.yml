name: Build and Deploy to Railway

on:
  push:
    branches: [ "main", "deploy/cloud" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Recreate School Files
        env:
          OTHELLO_JAVA: ${{ secrets.OTHELLO_JAVA_BASE64 }}
          OTHELLO_BOARD: ${{ secrets.OTHELLO_BOARD_BASE64 }}
          GREEDY_STRATEGY: ${{ secrets.GREEDY_STRATEGY_BASE64 }}
          HUMAN_STRATEGY: ${{ secrets.HUMAN_STRATEGY_BASE64 }}
          RANDOM_STRATEGY: ${{ secrets.RANDOM_STRATEGY_BASE64 }}
          PLAYER_GREEDY: ${{ secrets.PLAYER_GREEDY_BASE64 }}
          PLAYER_HUMAN: ${{ secrets.PLAYER_HUMAN_BASE64 }}
        run: |
          mkdir -p backend/src/main/java/com/othello/backend/engine/
          mkdir -p backend/src/main/java/com/othello/backend/strategy/
          
          echo "$OTHELLO_JAVA" | base64 -d > backend/src/main/java/com/othello/backend/engine/Othello.java
          echo "$OTHELLO_BOARD" | base64 -d > backend/src/main/java/com/othello/backend/engine/OthelloBoard.java
          echo "$GREEDY_STRATEGY" | base64 -d > backend/src/main/java/com/othello/backend/strategy/GreedyStrategy.java
          echo "$HUMAN_STRATEGY" | base64 -d > backend/src/main/java/com/othello/backend/strategy/HumanStrategy.java
          echo "$RANDOM_STRATEGY" | base64 -d > backend/src/main/java/com/othello/backend/strategy/RandomStrategy.java
          echo "$PLAYER_GREEDY" | base64 -d > backend/src/main/java/com/othello/backend/strategy/PlayerGreedy.java
          echo "$PLAYER_HUMAN" | base64 -d > backend/src/main/java/com/othello/backend/strategy/PlayerHuman.java
          
          # Verify files exist
          ls -l backend/src/main/java/com/othello/backend/engine/

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}