name: Build and Deploy to Railway

on:
  push:
    branches: [ "main", "deploy/cloud" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: TEST - Verify Othello.java Injection
        run: |
          mkdir -p backend/src/main/java/com/othello/backend/engine/
          
          # Write the secret to a file and decode it
          echo "${{ secrets.OTHELLO_JAVA_BASE64 }}" > temp_base64.txt
          openssl base64 -d -A -in temp_base64.txt -out backend/src/main/java/com/othello/backend/engine/Othello.java
          
          echo "Verification Results:"
          echo "-----------------------"
          echo "File size: $(stat -c%s backend/src/main/java/com/othello/backend/engine/Othello.java) bytes"
          echo "First 5 lines of the file:"
          head -n 5 backend/src/main/java/com/othello/backend/engine/Othello.java
          echo "-----------------------"
          
          # This 'exit 1' will force the action to fail so you can see the logs easily
          echo "Stopping test here to check logs..."
          exit 1

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}